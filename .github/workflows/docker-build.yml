name: "Build and Push to Docker Hub"

on:
  push:
    branches:
      - master
      - test
      - dev
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read

jobs:
  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (master)
        if: github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: madereddy/noisy:latest

      - name: Test image (master)
        if: github.ref == 'refs/heads/master'
        run: docker run --platform linux/amd64 madereddy/noisy:latest --timeout 20 --log debug

      - name: Build and push (test)
        if: github.ref == 'refs/heads/test'
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: madereddy/noisy:test

      - name: Test image (test)
        if: github.ref == 'refs/heads/test'
        run: docker run --platform linux/amd64 madereddy/noisy:test --timeout 20 --log debug

      - name: Build and push (dev)
        if: github.ref == 'refs/heads/dev'
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: madereddy/noisy:dev

      - name: Test image (dev)
        if: github.ref == 'refs/heads/dev'
        run: docker run --platform linux/amd64 madereddy/noisy:dev --timeout 20 --log debug

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: test-reports
          if-no-files-found: ignore

  prune-dockerhub:
    runs-on: ubuntu-latest
    needs: build
    if: |
      always() &&
      (github.event_name == 'push' && needs.build.result == 'success') ||
      github.event_name == 'schedule'
    steps:
      - name: Prune old tags from Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          # Get auth token
          TOKEN=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${DOCKERHUB_USERNAME}\",\"password\":\"${DOCKERHUB_TOKEN}\"}" \
            https://hub.docker.com/v2/users/login/ | jq -r .token)

          # Keep latest, test, and dev always — keep 10 most recent versioned tags
          TAGS=$(curl -s \
            -H "Authorization: JWT ${TOKEN}" \
            "https://hub.docker.com/v2/repositories/madereddy/noisy/tags/?page_size=100&ordering=last_updated" \
            | jq -r '.results[] | select(.name | IN("latest", "test", "dev") | not) | .name' \
            | tail -n +11)

          if [ -z "$TAGS" ]; then
            echo "No tags to prune."
            exit 0
          fi

          for TAG in $TAGS; do
            echo "Deleting tag: $TAG"
            curl -s -X DELETE \
              -H "Authorization: JWT ${TOKEN}" \
              "https://hub.docker.com/v2/repositories/madereddy/noisy/tags/${TAG}/"
          done
