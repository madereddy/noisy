name: "Build and Push to Docker Hub"

on:
  push:
    branches:
      - master
      - test
      - dev
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read

jobs:
  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to Docker Hub
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (master)
        if: github.ref == 'refs/heads/master'
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            madereddy/noisy:latest
            madereddy/noisy:${{ github.sha }}

      - name: Test image (master)
        if: github.ref == 'refs/heads/master'
        run: docker run --platform linux/amd64 madereddy/noisy:latest --timeout 20 --log debug

      - name: Build and push (test)
        if: github.ref == 'refs/heads/test'
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            madereddy/noisy:test
            madereddy/noisy:${{ github.sha }}-test

      - name: Test image (test)
        if: github.ref == 'refs/heads/test'
        run: docker run --platform linux/amd64 madereddy/noisy:test --timeout 20 --log debug

      - name: Build and push (dev)
        if: github.ref == 'refs/heads/dev'
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            madereddy/noisy:dev
            madereddy/noisy:${{ github.sha }}-dev

      - name: Test image (dev)
        if: github.ref == 'refs/heads/dev'
        run: docker run --platform linux/amd64 madereddy/noisy:dev --timeout 20 --log debug

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: test-reports
          path: test-reports
          if-no-files-found: ignore

  prune-dockerhub:
    runs-on: ubuntu-latest
    needs: build
    if: |
      always() && (
        (github.event_name == 'push' && needs.build.result == 'success') ||
        github.event_name == 'schedule'
      )
    steps:
      - name: Prune old and untagged images from Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          TOKEN=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${DOCKERHUB_USERNAME}\",\"password\":\"${DOCKERHUB_TOKEN}\"}" \
            https://hub.docker.com/v2/users/login/ | jq -r .token)

          # Delete all untagged images via the manifests API
          # Fetch all digests that have no tags associated
          DIGESTS=$(curl -s \
            -H "Authorization: JWT ${TOKEN}" \
            "https://hub.docker.com/v2/repositories/madereddy/noisy/tags/?page_size=100" \
            | jq -r '.results[] | select(.images[].digest != null) | .images[].digest' | sort -u)

          ALL_TAGGED_DIGESTS=$(curl -s \
            -H "Authorization: JWT ${TOKEN}" \
            "https://hub.docker.com/v2/repositories/madereddy/noisy/tags/?page_size=100" \
            | jq -r '.results[] | select(.name | startswith("sha256:") | not) | .images[].digest' | sort -u)

          for DIGEST in $DIGESTS; do
            if ! echo "$ALL_TAGGED_DIGESTS" | grep -qx "$DIGEST"; then
              echo "Deleting untagged digest: $DIGEST"
              curl -s -X DELETE \
                -H "Authorization: JWT ${TOKEN}" \
                "https://hub.docker.com/v2/repositories/madereddy/noisy/manifests/${DIGEST}"
            fi
          done

          # Keep latest, test, dev always — keep 10 most recent sha-tagged builds
          TAGS=$(curl -s \
            -H "Authorization: JWT ${TOKEN}" \
            "https://hub.docker.com/v2/repositories/madereddy/noisy/tags/?page_size=100&ordering=last_updated" \
            | jq -r '.results[] | select(.name | IN("latest", "test", "dev") | not) | .name' \
            | tail -n +11)

          if [ -z "$TAGS" ]; then
            echo "No versioned tags to prune."
            exit 0
          fi

          for TAG in $TAGS; do
            echo "Deleting old tag: $TAG"
            curl -s -X DELETE \
              -H "Authorization: JWT ${TOKEN}" \
              "https://hub.docker.com/v2/repositories/madereddy/noisy/tags/${TAG}/"
          done
