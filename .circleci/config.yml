version: 2.1
executors:
  docker-publisher:
    environment:
      IMAGE_NAME: madereddy/noisy
    docker:
      - image: cimg/python:3.14.3
jobs:
  build:
    executor: docker-publisher
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Install Docker Buildx
          command: |
            DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
            mkdir -p $DOCKER_CONFIG/cli-plugins
            curl -SL "https://github.com/docker/buildx/releases/download/v0.16.2/buildx-v0.16.2.linux-amd64" -o $DOCKER_CONFIG/cli-plugins/docker-buildx
            chmod a+x $DOCKER_CONFIG/cli-plugins/docker-buildx
      - run:
          name: Create and use new Buildx builder
          command: |
            docker buildx create --use
      - run:
          name: Build Docker image
          command: |
            docker build -t $IMAGE_NAME:latest .
      - run:
          name: Test Docker image (amd64)
          command: |
            docker run --platform linux/amd64 $IMAGE_NAME:latest --timeout 20 --log debug
      - run:
          name: Build and push multi-arch Docker image
          command: |
            echo "$AccessToken" | docker login -u "$Login" --password-stdin
            docker buildx build --platform linux/amd64,linux/arm64 -t $IMAGE_NAME:latest --push .
      - store_artifacts:
          path: test-reports
          destination: test-reports

  build-test:
    executor: docker-publisher
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Install Docker Buildx
          command: |
            DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
            mkdir -p $DOCKER_CONFIG/cli-plugins
            curl -SL "https://github.com/docker/buildx/releases/download/v0.16.2/buildx-v0.16.2.linux-amd64" -o $DOCKER_CONFIG/cli-plugins/docker-buildx
            chmod a+x $DOCKER_CONFIG/cli-plugins/docker-buildx
      - run:
          name: Create and use new Buildx builder
          command: |
            docker buildx create --use
      - run:
          name: Build Docker image
          command: |
            docker build -t $IMAGE_NAME:test .
      - run:
          name: Test Docker image (amd64)
          command: |
            docker run --platform linux/amd64 $IMAGE_NAME:test --timeout 20 --log debug
      - run:
          name: Build and push multi-arch Docker image
          command: |
            echo "$AccessToken" | docker login -u "$Login" --password-stdin
            docker buildx build --platform linux/amd64,linux/arm64 -t $IMAGE_NAME:test --push .
      - store_artifacts:
          path: test-reports
          destination: test-reports

  build-dev:
    executor: docker-publisher
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Install Docker Buildx
          command: |
            DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
            mkdir -p $DOCKER_CONFIG/cli-plugins
            curl -SL "https://github.com/docker/buildx/releases/download/v0.16.2/buildx-v0.16.2.linux-amd64" -o $DOCKER_CONFIG/cli-plugins/docker-buildx
            chmod a+x $DOCKER_CONFIG/cli-plugins/docker-buildx
      - run:
          name: Create and use new Buildx builder
          command: |
            docker buildx create --use
      - run:
          name: Build Docker image
          command: |
            docker build -t $IMAGE_NAME:dev .
      - run:
          name: Test Docker image (amd64)
          command: |
            docker run --platform linux/amd64 $IMAGE_NAME:dev --timeout 20 --log debug

  prune-dockerhub:
    docker:
      - image: cimg/base:stable
    steps:
      - run:
          name: Prune old Docker Hub images
          command: |
            # Get auth token
            TOKEN=$(curl -s -X POST \
              -H "Content-Type: application/json" \
              -d "{\"username\":\"${Login}\",\"password\":\"${AccessToken}\"}" \
              https://hub.docker.com/v2/users/login/ | jq -r .token)

            # Fetch all tags except 'latest', 'test', and 'dev', sorted newest first, skip 3 most recent
            TAGS=$(curl -s \
              -H "Authorization: JWT ${TOKEN}" \
              "https://hub.docker.com/v2/repositories/madereddy/noisy/tags/?page_size=100&ordering=last_updated" \
              | jq -r '.results[] | select(.name | IN("latest", "test", "dev") | not) | .name' \
              | tail -n +4)

            if [ -z "$TAGS" ]; then
              echo "No tags to prune."
              exit 0
            fi

            # Delete each old tag
            for TAG in $TAGS; do
              echo "Deleting tag: $TAG"
              curl -s -X DELETE \
                -H "Authorization: JWT ${TOKEN}" \
                "https://hub.docker.com/v2/repositories/madereddy/noisy/tags/${TAG}/"
            done

workflows:
  version: 2
  build-master:
    jobs:
      - build:
          filters:
            branches:
              only: master
      - build-test:
          filters:
            branches:
              only: test
      - build-dev:
          filters:
            branches:
              only: dev

  weekly-prune:
    triggers:
      - schedule:
          cron: "0 9 * * 1"
          filters:
            branches:
              only: master
    jobs:
      - prune-dockerhub
